<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect x="1" y="1" width="62" height="62" rx="10" fill="#141a10"/>

  <!-- Rail Picatinny (base) -->
  <rect x="6" y="30" width="52" height="8" rx="2" fill="#3d5030" stroke="#6a8a55" stroke-width="1.5"/>

  <!-- Dents du rail Picatinny (au-dessus) -->
  <rect x="10" y="23" width="7" height="8" rx="1.5" fill="#4a6038" stroke="#6a8a55" stroke-width="1.2"/>
  <rect x="22" y="23" width="7" height="8" rx="1.5" fill="#4a6038" stroke="#6a8a55" stroke-width="1.2"/>
  <rect x="34" y="23" width="7" height="8" rx="1.5" fill="#4a6038" stroke="#6a8a55" stroke-width="1.2"/>
  <rect x="46" y="23" width="7" height="8" rx="1.5" fill="#4a6038" stroke="#6a8a55" stroke-width="1.2"/>

  <!-- Accessoire monté sur le rail (représenté par un bloc générique) -->
  <rect x="18" y="12" width="28" height="14" rx="3" fill="#3d5030" stroke="#6a8a55" stroke-width="1.5"/>
  <!-- Détail intérieur de l'accessoire -->
  <circle cx="32" cy="19" r="4" fill="#0a1008" stroke="#6a8a55" stroke-width="1"/>
  <circle cx="32" cy="19" r="2" fill="#4a6038"/>

  <!-- Vis de fixation sur le rail -->
  <circle cx="20" cy="34" r="2" fill="#6a8a55" stroke="#3d5030" stroke-width="0.8"/>
  <circle cx="44" cy="34" r="2" fill="#6a8a55" stroke="#3d5030" stroke-width="0.8"/>
  <!-- Fente des vis -->
  <line x1="19" y1="34" x2="21" y2="34" stroke="#2a3a20" stroke-width="0.8"/>
  <line x1="43" y1="34" x2="45" y2="34" stroke="#2a3a20" stroke-width="0.8"/>

  <!-- Reflet sur le rail -->
  <rect x="7" y="31" width="50" height="1.5" rx="0.5" fill="#8aaa65" opacity="0.2"/>
</svg>
